server:
  port: 5002
spring:
  application:
    name: job-portal-company-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

    datasource:
      url: jdbc:postgresql://localhost:5432/job_portal_company
      username: postgres
      password: password
      driver-class-name: org.postgresql.Driver

